<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180" role="img" aria-label="MedAgent AI">
  <title>MedAgent AI — Stacked lockup</title>
  <defs>
    <linearGradient id="tileS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="sheenS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Mark, centered -->
  <g transform="translate(70 0)">
    <rect x="0" y="0" width="80" height="80" rx="20" ry="20" fill="url(#tileS)"/>
    <rect x="0" y="0" width="80" height="80" rx="20" ry="20" fill="url(#sheenS)"/>
    <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
      <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      <path d="M58.5 40.5 L65.5 47.5 M58.5 47.5 L65.5 40.5" stroke-width="2" opacity="0.7"/>
    </g>
  </g>

  <!-- Wordmark below -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <text x="110" y="124" font-size="28" font-weight="700" fill="#0f172a" letter-spacing="-0.6">
      MedAgent<tspan fill="#0e7490">·AI</tspan>
    </text>
    <text x="110" y="148" font-size="10" font-weight="600" fill="#64748b" letter-spacing="3.2">
      CLINICAL  INTELLIGENCE
    </text>
  </g>
</svg>
