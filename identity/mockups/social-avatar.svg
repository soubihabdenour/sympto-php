<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="MedAgent AI avatar">
  <title>MedAgent AI — Social avatar (square, 400×400)</title>
  <defs>
    <linearGradient id="avTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="30%" stop-color="#0891b2"/>
      <stop offset="75%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="avSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
