<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="Inter, system-ui, sans-serif">
  <title>MedAgent AI — Business card (front + back, 85×55 mm)</title>
  <rect width="760" height="480" fill="#eef2f6"/>

  <defs>
    <linearGradient id="cardBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- FRONT -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="60" width="340" height="220" rx="12" fill="#ffffff"/>
  </g>
  <g transform="translate(60 84)">
    <!-- Mark -->
    <g transform="scale(0.625)">
      <rect width="80" height="80" rx="20" fill="url(#cardBack)"/>
      <rect width="80" height="80" rx="20" fill="url(#cardSheen)"/>
      <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <text x="62" y="22" font-size="20" font-weight="700" fill="#0f172a" letter-spacing="-0.4">MedAgent<tspan fill="#0e7490">·AI</tspan></text>
    <text x="62" y="40" font-size="9" font-weight="600" fill="#64748b" letter-spacing="2">CLINICAL  INTELLIGENCE</text>
  </g>

  <g transform="translate(60 200)">
    <text x="0" y="0" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="-0.2">Dr. Camille Renault</text>
    <text x="0" y="20" font-size="11" font-weight="500" fill="#475569">Médecin généraliste · MD, PhD</text>
    <line x1="0" y1="30" x2="36" y2="30" stroke="#0e7490" stroke-width="2"/>
    <text x="0" y="50" font-size="10" font-weight="500" fill="#334155">camille@medagent.ai</text>
    <text x="0" y="64" font-size="10" font-weight="500" fill="#334155">+33 1 42 00 00 00 · medagent.ai</text>
  </g>

  <!-- BACK -->
  <g filter="url(#cardShadow)">
    <rect x="400" y="60" width="340" height="220" rx="12" fill="url(#cardBack)"/>
    <rect x="400" y="60" width="340" height="220" rx="12" fill="url(#cardSheen)"/>
  </g>
  <!-- Big mark on back, watermark style -->
  <g transform="translate(450 100) scale(2.0)" opacity="0.95">
    <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
      <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      <path d="M58.5 40.5 L65.5 47.5 M58.5 47.5 L65.5 40.5" stroke-width="2" opacity="0.7"/>
    </g>
  </g>
  <text x="420" y="260" font-size="10" font-weight="600" fill="#cffafe" letter-spacing="2">DECISION SUPPORT · NOT A DIAGNOSTIC DEVICE</text>

  <!-- Label -->
  <text x="40" y="320" font-size="11" font-weight="700" fill="#0f172a" letter-spacing="2">BUSINESS CARD · 85 × 55 mm · FRONT &amp; BACK</text>
  <text x="40" y="340" font-size="11" fill="#475569">Print uncoated 350gsm. Spot UV on the mark optional. Bleed 3mm, safe area 4mm.</text>

  <!-- Trim marks (decorative) -->
  <g stroke="#94a3b8" stroke-width="0.6">
    <line x1="40" y1="56" x2="40" y2="48"/><line x1="40" y1="56" x2="32" y2="56"/>
    <line x1="380" y1="56" x2="380" y2="48"/><line x1="380" y1="56" x2="388" y2="56"/>
    <line x1="40" y1="284" x2="40" y2="292"/><line x1="40" y1="284" x2="32" y2="284"/>
    <line x1="380" y1="284" x2="380" y2="292"/><line x1="380" y1="284" x2="388" y2="284"/>

    <line x1="400" y1="56" x2="400" y2="48"/><line x1="400" y1="56" x2="392" y2="56"/>
    <line x1="740" y1="56" x2="740" y2="48"/><line x1="740" y1="56" x2="748" y2="56"/>
    <line x1="400" y1="284" x2="400" y2="292"/><line x1="400" y1="284" x2="392" y2="284"/>
    <line x1="740" y1="284" x2="740" y2="292"/><line x1="740" y1="284" x2="748" y2="284"/>
  </g>
</svg>
