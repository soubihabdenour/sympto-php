<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, system-ui, sans-serif">
  <title>MedAgent AI — Open Graph card (1200×630)</title>
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <radialGradient id="ogGlow1" cx="0.05" cy="-0.1" r="0.7">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ogGlow2" cx="1.1" cy="0.1" r="0.7">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="ogSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogGlow1)"/>
  <rect width="1200" height="630" fill="url(#ogGlow2)"/>

  <!-- Mark + wordmark, top-left -->
  <g transform="translate(72 72)">
    <g>
      <rect width="80" height="80" rx="20" fill="url(#ogTile)"/>
      <rect width="80" height="80" rx="20" fill="url(#ogSheen)"/>
      <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <text x="100" y="46" font-size="30" font-weight="700" fill="#0f172a" letter-spacing="-0.6">MedAgent<tspan fill="#0e7490">·AI</tspan></text>
    <text x="100" y="66" font-size="11" font-weight="600" fill="#64748b" letter-spacing="2.4">CLINICAL  INTELLIGENCE</text>
  </g>

  <!-- Headline -->
  <g transform="translate(72 240)">
    <rect x="0" y="0" width="160" height="32" rx="16" fill="#ecfeff" stroke="#cffafe"/>
    <text x="80" y="21" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490" letter-spacing="2.2">FOR CLINICIANS</text>

    <text x="0" y="92" font-size="64" font-weight="700" fill="#0f172a" letter-spacing="-1.6">Differential diagnosis,</text>
    <text x="0" y="160" font-size="64" font-weight="700" fill="#0f172a" letter-spacing="-1.6">drafted in <tspan fill="#0e7490">seconds.</tspan></text>

    <text x="0" y="220" font-size="22" font-weight="500" fill="#475569">15 specialist agents · 11-section structured report · EN · FR · DE</text>
  </g>

  <!-- Decorative pulse glyph, bottom-right -->
  <g transform="translate(900 470)" fill="none" stroke="#0e7490" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M0 50 H40 L52 0 L88 100 L120 -10 L140 50 H180"/>
    <g transform="translate(225 50)">
      <path d="M-30 0 L30 0 M0 -30 L0 30"/>
      <path d="M-18 -18 L18 18 M-18 18 L18 -18" stroke-width="4" opacity="0.7"/>
    </g>
  </g>

  <!-- Footer -->
  <line x1="72" y1="572" x2="1128" y2="572" stroke="#e2e8f0"/>
  <text x="72"  y="600" font-size="14" font-weight="600" fill="#64748b">medagent.ai</text>
  <text x="1128" y="600" text-anchor="end" font-size="14" fill="#94a3b8">Decision support · Not a diagnostic device</text>
</svg>
