<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="Inter, system-ui, sans-serif">
  <title>MedAgent AI — Do's and Don'ts</title>
  <defs>
    <linearGradient id="ddTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="720" fill="#ffffff"/>

  <text x="60" y="74" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-0.6">Do's &amp; Don'ts</text>
  <text x="60" y="104" font-size="14" font-weight="500" fill="#64748b">Six rules. They're enough.</text>
  <line x1="60" y1="124" x2="1020" y2="124" stroke="#e2e8f0"/>

  <!-- helper: 3 across, 2 rows -->
  <!-- Row 1: DO -->
  <g transform="translate(60 160)">
    <!-- DO 1: full color on white -->
    <rect width="300" height="220" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <g transform="translate(110 50)">
      <rect width="80" height="80" rx="20" fill="url(#ddTile)"/>
      <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <circle cx="270" cy="22" r="11" fill="#10b981"/>
    <path d="M265 22 l4 4 l7 -7" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="180" font-size="13" font-weight="700" fill="#0f172a">Use the full-color mark on neutral surfaces.</text>
    <text x="20" y="198" font-size="11" fill="#64748b">White or ink-50 backgrounds give the gradient room to breathe.</text>
  </g>

  <g transform="translate(390 160)">
    <!-- DO 2: reverse on ink-900 -->
    <rect width="300" height="220" rx="14" fill="#0f172a"/>
    <g transform="translate(110 50)">
      <rect width="80" height="80" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
      <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <circle cx="270" cy="22" r="11" fill="#10b981"/>
    <path d="M265 22 l4 4 l7 -7" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="180" font-size="13" font-weight="700" fill="#ffffff">Use the reverse mark on ink-900.</text>
    <text x="20" y="198" font-size="11" fill="#94a3b8">Stroke-only glyph keeps the silhouette crisp on dark UI.</text>
  </g>

  <g transform="translate(720 160)">
    <!-- DO 3: monochrome for print -->
    <rect width="300" height="220" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <g transform="translate(110 50)">
      <rect width="80" height="80" rx="20" fill="#0f172a"/>
      <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <circle cx="270" cy="22" r="11" fill="#10b981"/>
    <path d="M265 22 l4 4 l7 -7" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="180" font-size="13" font-weight="700" fill="#0f172a">Use single-ink for fax, stamp, embossing.</text>
    <text x="20" y="198" font-size="11" fill="#64748b">Black on white or white on black — never re-color the gradient.</text>
  </g>

  <!-- Row 2: DON'T -->
  <g transform="translate(60 400)">
    <rect width="300" height="220" rx="14" fill="#fef2f2" stroke="#fecaca"/>
    <g transform="translate(110 50)">
      <rect width="80" height="80" rx="20" fill="#f43f5e"/>
      <g fill="none" stroke="#fde047" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <g stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
      <line x1="259" y1="11" x2="281" y2="33"/>
      <line x1="281" y1="11" x2="259" y2="33"/>
    </g>
    <text x="20" y="180" font-size="13" font-weight="700" fill="#7f1d1d">Don't re-color the tile or glyph.</text>
    <text x="20" y="198" font-size="11" fill="#991b1b">Brand teal is the only approved background; white is the only approved glyph.</text>
  </g>

  <g transform="translate(390 400)">
    <rect width="300" height="220" rx="14" fill="#fef2f2" stroke="#fecaca"/>
    <g transform="translate(80 50) scale(1, 0.6)">
      <rect width="140" height="140" rx="20" fill="url(#ddTile)"/>
      <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" transform="scale(1.75)">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <g stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
      <line x1="259" y1="11" x2="281" y2="33"/>
      <line x1="281" y1="11" x2="259" y2="33"/>
    </g>
    <text x="20" y="180" font-size="13" font-weight="700" fill="#7f1d1d">Don't stretch or distort.</text>
    <text x="20" y="198" font-size="11" fill="#991b1b">Always scale proportionally. Lock aspect ratio in your editor.</text>
  </g>

  <g transform="translate(720 400)">
    <rect width="300" height="220" rx="14" fill="#fef2f2" stroke="#fecaca"/>
    <!-- Busy photo bg simulated -->
    <g transform="translate(20 38) " >
      <defs>
        <pattern id="noise" width="8" height="8" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="1.6" fill="#fb7185"/>
          <circle cx="6" cy="5" r="1.2" fill="#a16207"/>
          <circle cx="3" cy="6" r="1.0" fill="#1d4ed8"/>
        </pattern>
      </defs>
      <rect width="260" height="104" rx="10" fill="url(#noise)"/>
      <g transform="translate(90 12)">
        <rect width="80" height="80" rx="20" fill="url(#ddTile)"/>
        <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
          <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
        </g>
      </g>
    </g>
    <g stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
      <line x1="259" y1="11" x2="281" y2="33"/>
      <line x1="281" y1="11" x2="259" y2="33"/>
    </g>
    <text x="20" y="180" font-size="13" font-weight="700" fill="#7f1d1d">Don't place on busy or low-contrast backgrounds.</text>
    <text x="20" y="198" font-size="11" fill="#991b1b">Use a solid panel or a 25% scrim if a photo is unavoidable.</text>
  </g>
</svg>
