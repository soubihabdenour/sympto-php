<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="Inter, system-ui, sans-serif">
  <title>MedAgent AI — Clear space &amp; minimum sizes</title>
  <defs>
    <linearGradient id="csTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1080" height="720" fill="#ffffff"/>

  <text x="60" y="74" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-0.6">Clear space &amp; sizing</text>
  <text x="60" y="104" font-size="14" font-weight="500" fill="#64748b">
    Reserve breathing room of <tspan font-weight="700" fill="#0e7490">X</tspan>, where X equals the mark's corner radius.
  </text>
  <line x1="60" y1="124" x2="1020" y2="124" stroke="#e2e8f0"/>

  <!-- LEFT: clear-space demo -->
  <text x="60" y="160" font-size="12" font-weight="700" fill="#0e7490" letter-spacing="2">CLEAR SPACE — MARK</text>

  <g transform="translate(60 180)">
    <rect x="0" y="0" width="380" height="380" fill="url(#grid)"/>

    <!-- Mark centered at (190, 190), 160 wide → tile 160; X = corner radius = 40 (scaled from 20) -->
    <g transform="translate(110 110)">
      <rect width="160" height="160" rx="40" fill="url(#csTile)"/>
      <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" transform="scale(2)">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <!-- Clear-space rule: padding = 40 -->
    <rect x="70" y="70" width="240" height="240" fill="none" stroke="#0e7490" stroke-width="1" stroke-dasharray="4 4"/>
    <!-- X labels -->
    <line x1="70" y1="50" x2="110" y2="50" stroke="#0e7490" stroke-width="1"/>
    <text x="76" y="44" font-size="11" font-weight="700" fill="#0e7490">X</text>
    <line x1="50" y1="70" x2="50" y2="110" stroke="#0e7490" stroke-width="1"/>
    <text x="40" y="98" font-size="11" font-weight="700" fill="#0e7490">X</text>
  </g>

  <!-- RIGHT: minimum sizes -->
  <text x="500" y="160" font-size="12" font-weight="700" fill="#0e7490" letter-spacing="2">MINIMUM SIZES</text>

  <g transform="translate(500 180)">
    <!-- App icon 64 -->
    <g transform="translate(0 0)">
      <rect width="64" height="64" rx="16" fill="url(#csTile)"/>
      <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="scale(0.8)">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
    </g>
    <text x="0" y="86" font-size="11" font-weight="700" fill="#0f172a">App icon · 64 px min</text>
    <text x="0" y="100" font-size="10" fill="#64748b">Under 64px, use favicon variant.</text>

    <!-- Favicon 16/32 -->
    <g transform="translate(180 0)">
      <rect width="32" height="32" rx="8" fill="url(#csTile)"/>
      <g fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 18 H10 L12 12 L15 24 L18 14 L20 18 H22"/>
        <path d="M26 18 L29 18 M26 18 L23 18 M26 18 L26 15 M26 18 L26 21" stroke-width="1.6"/>
      </g>
    </g>
    <g transform="translate(232 8)">
      <rect width="16" height="16" rx="4" fill="url(#csTile)"/>
    </g>
    <text x="180" y="86"  font-size="11" font-weight="700" fill="#0f172a">Favicon · 16 &amp; 32 px</text>
    <text x="180" y="100" font-size="10" fill="#64748b">Simplified glyph; no sparkle cross-bars.</text>

    <!-- Wordmark min -->
    <g transform="translate(0 140)">
      <text x="0" y="22" font-size="22" font-weight="700" fill="#0f172a" letter-spacing="-0.4">MedAgent<tspan fill="#0e7490">·AI</tspan></text>
    </g>
    <text x="0" y="186" font-size="11" font-weight="700" fill="#0f172a">Wordmark · 22 px min</text>
    <text x="0" y="200" font-size="10" fill="#64748b">Below 18px, hairline strokes fail on shared hosting.</text>

    <!-- Print min -->
    <g transform="translate(0 240)">
      <rect width="48" height="48" rx="12" fill="url(#csTile)"/>
      <g fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="scale(0.6)">
        <path d="M14 44 H26 L30 30 L38 58 L44 36 L48 44 H54"/>
        <path d="M62 44 L68 44 M62 44 L56 44 M62 44 L62 38 M62 44 L62 50"/>
      </g>
      <text x="64" y="20" font-size="11" font-weight="700" fill="#0f172a">Print mark · 8 mm min</text>
      <text x="64" y="36" font-size="10" fill="#64748b">Spot UV permitted at 10 mm and above.</text>
    </g>
  </g>
</svg>
