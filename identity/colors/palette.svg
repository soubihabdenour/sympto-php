<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="Inter, system-ui, sans-serif">
  <title>MedAgent AI — Color system</title>
  <rect width="1080" height="720" fill="#ffffff"/>

  <!-- Header -->
  <text x="60" y="74" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-0.6">Color System</text>
  <text x="60" y="104" font-size="14" font-weight="500" fill="#64748b" letter-spacing="0.4">
    Teal expresses clinical clarity. Ink anchors typography. Vital green and warning amber signal status.
  </text>
  <line x1="60" y1="124" x2="1020" y2="124" stroke="#e2e8f0" stroke-width="1"/>

  <!-- BRAND / TEAL -->
  <text x="60" y="160" font-size="13" font-weight="700" fill="#0e7490" letter-spacing="2">BRAND  ·  TEAL</text>
  <g>
    <!-- 50 -->
    <rect x="60" y="176" width="100" height="100" rx="14" fill="#ecfeff" stroke="#e2e8f0"/>
    <text x="60" y="294" font-size="11" font-weight="600" fill="#0f172a">brand-50</text>
    <text x="60" y="310" font-size="10" fill="#64748b">#ECFEFF</text>
    <!-- 100 -->
    <rect x="170" y="176" width="100" height="100" rx="14" fill="#cffafe"/>
    <text x="170" y="294" font-size="11" font-weight="600" fill="#0f172a">brand-100</text>
    <text x="170" y="310" font-size="10" fill="#64748b">#CFFAFE</text>
    <!-- 200 -->
    <rect x="280" y="176" width="100" height="100" rx="14" fill="#a5f3fc"/>
    <text x="280" y="294" font-size="11" font-weight="600" fill="#0f172a">brand-200</text>
    <text x="280" y="310" font-size="10" fill="#64748b">#A5F3FC</text>
    <!-- 300 -->
    <rect x="390" y="176" width="100" height="100" rx="14" fill="#67e8f9"/>
    <text x="390" y="294" font-size="11" font-weight="600" fill="#0f172a">brand-300</text>
    <text x="390" y="310" font-size="10" fill="#64748b">#67E8F9</text>
    <!-- 400 -->
    <rect x="500" y="176" width="100" height="100" rx="14" fill="#22d3ee"/>
    <text x="500" y="294" font-size="11" font-weight="600" fill="#0f172a">brand-400</text>
    <text x="500" y="310" font-size="10" fill="#64748b">#22D3EE</text>
    <!-- 500 -->
    <rect x="610" y="176" width="100" height="100" rx="14" fill="#06b6d4"/>
    <text x="610" y="294" font-size="11" font-weight="600" fill="#0f172a">brand-500</text>
    <text x="610" y="310" font-size="10" fill="#64748b">#06B6D4</text>
    <!-- 600 -->
    <rect x="720" y="176" width="100" height="100" rx="14" fill="#0891b2"/>
    <text x="720" y="294" font-size="11" font-weight="600" fill="#0f172a">brand-600</text>
    <text x="720" y="310" font-size="10" fill="#64748b">#0891B2</text>
    <!-- 700 PRIMARY -->
    <rect x="830" y="176" width="100" height="100" rx="14" fill="#0e7490"/>
    <text x="830" y="294" font-size="11" font-weight="700" fill="#0f172a">brand-700 ★</text>
    <text x="830" y="310" font-size="10" fill="#64748b">#0E7490  PRIMARY</text>
    <!-- 800 -->
    <rect x="60"  y="334" width="100" height="60" rx="10" fill="#155e75"/>
    <text x="60"  y="412" font-size="11" font-weight="600" fill="#0f172a">brand-800</text>
    <text x="60"  y="428" font-size="10" fill="#64748b">#155E75</text>
    <!-- 900 -->
    <rect x="170" y="334" width="100" height="60" rx="10" fill="#164e63"/>
    <text x="170" y="412" font-size="11" font-weight="600" fill="#0f172a">brand-900</text>
    <text x="170" y="428" font-size="10" fill="#64748b">#164E63</text>
  </g>

  <!-- INK -->
  <text x="320" y="354" font-size="13" font-weight="700" fill="#334155" letter-spacing="2">INK  ·  NEUTRALS</text>
  <g>
    <rect x="320" y="368" width="80" height="60" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="320" y="444" font-size="10" font-weight="600" fill="#0f172a">ink-50</text>
    <rect x="408" y="368" width="80" height="60" rx="10" fill="#f1f5f9"/>
    <text x="408" y="444" font-size="10" font-weight="600" fill="#0f172a">ink-100</text>
    <rect x="496" y="368" width="80" height="60" rx="10" fill="#e2e8f0"/>
    <text x="496" y="444" font-size="10" font-weight="600" fill="#0f172a">ink-200</text>
    <rect x="584" y="368" width="80" height="60" rx="10" fill="#cbd5e1"/>
    <text x="584" y="444" font-size="10" font-weight="600" fill="#0f172a">ink-300</text>
    <rect x="672" y="368" width="80" height="60" rx="10" fill="#94a3b8"/>
    <text x="672" y="444" font-size="10" font-weight="600" fill="#0f172a">ink-400</text>
    <rect x="760" y="368" width="80" height="60" rx="10" fill="#64748b"/>
    <text x="760" y="444" font-size="10" font-weight="600" fill="#0f172a">ink-500</text>
    <rect x="848" y="368" width="80" height="60" rx="10" fill="#475569"/>
    <text x="848" y="444" font-size="10" font-weight="600" fill="#0f172a">ink-600</text>
    <rect x="936" y="368" width="80" height="60" rx="10" fill="#334155"/>
    <text x="936" y="444" font-size="10" font-weight="600" fill="#0f172a">ink-700</text>
    <rect x="320" y="464" width="80" height="40" rx="8" fill="#1e293b"/>
    <text x="320" y="520" font-size="10" font-weight="600" fill="#0f172a">ink-800</text>
    <rect x="408" y="464" width="80" height="40" rx="8" fill="#0f172a"/>
    <text x="408" y="520" font-size="10" font-weight="600" fill="#0f172a">ink-900</text>
  </g>

  <!-- STATUS -->
  <text x="60" y="490" font-size="13" font-weight="700" fill="#047857" letter-spacing="2">STATUS</text>
  <g>
    <rect x="60"  y="504" width="80" height="60" rx="10" fill="#ecfdf5"/>
    <rect x="148" y="504" width="80" height="60" rx="10" fill="#10b981"/>
    <rect x="236" y="504" width="80" height="60" rx="10" fill="#047857"/>
    <text x="60"  y="582" font-size="10" font-weight="600" fill="#0f172a">vital-50</text>
    <text x="148" y="582" font-size="10" font-weight="600" fill="#0f172a">vital-500</text>
    <text x="236" y="582" font-size="10" font-weight="600" fill="#0f172a">vital-700</text>

    <rect x="60"  y="600" width="80" height="60" rx="10" fill="#fffbeb"/>
    <rect x="148" y="600" width="80" height="60" rx="10" fill="#f59e0b"/>
    <rect x="236" y="600" width="80" height="60" rx="10" fill="#b45309"/>
    <text x="60"  y="678" font-size="10" font-weight="600" fill="#0f172a">warn-50</text>
    <text x="148" y="678" font-size="10" font-weight="600" fill="#0f172a">warn-500</text>
    <text x="236" y="678" font-size="10" font-weight="600" fill="#0f172a">warn-700</text>
  </g>

  <!-- Gradient + dark -->
  <text x="560" y="490" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="2">SIGNATURES</text>
  <defs>
    <linearGradient id="pSig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="pBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect x="560" y="504" width="220" height="100" rx="14" fill="url(#pSig)"/>
  <text x="572" y="538" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="2">BRAND GRADIENT</text>
  <text x="572" y="558" font-size="10" fill="#cffafe">#0891B2 → #0E7490 → #155E75</text>
  <text x="572" y="588" font-size="10" fill="#cffafe">Tiles · App icon · Hero accents</text>

  <rect x="800" y="504" width="220" height="100" rx="14" fill="url(#pBg)" stroke="#e2e8f0"/>
  <text x="812" y="538" font-size="11" font-weight="700" fill="#0f172a" letter-spacing="2">CANVAS</text>
  <text x="812" y="558" font-size="10" fill="#475569">#FFFFFF → #F8FAFC</text>
  <text x="812" y="588" font-size="10" fill="#475569">App background · Cards</text>

  <rect x="560" y="616" width="460" height="60" rx="12" fill="#0f172a"/>
  <text x="572" y="650" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="2">DARK INK</text>
  <text x="572" y="668" font-size="10" fill="#94a3b8">#0F172A — used for body type, charts, dark surfaces</text>
</svg>
